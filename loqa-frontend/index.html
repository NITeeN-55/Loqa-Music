<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0A0A0F"/>
  <meta name="description" content="Loqa Music — Stream millions of songs powered by YouTube"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <title>Loqa Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:#0A0A0F;color:#F0F0FF;font-family:'Inter',-apple-system,sans-serif}
    #root{height:100%;display:flex;flex-direction:column}
    /* Dedicated portal container — sits alongside #root, never inside it */
    #loqa-portals{position:fixed;inset:0;pointer-events:none;z-index:100}
    #loqa-portals>*{pointer-events:auto}
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Portal target: completely separate from #root so React never confuses the two trees -->
  <div id="loqa-portals"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
