services:
  - type: web
    name: loqa-music-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # ⚠️  Set MONGODB_URI and JWT_SECRET manually in Render dashboard → Environment tab
      # They are marked sync:false so they are NEVER committed to git
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      # ALLOWED_ORIGINS: comma-separated list of allowed frontend URLs (no trailing slashes)
      - key: ALLOWED_ORIGINS
        value: https://loqa-music.vercel.app
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: INNERTUBE_API_KEY
        value: AIzaSyAO_FJ2SlqU8Q4STEHLGCilw_Y9_11qcW8
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "150"
